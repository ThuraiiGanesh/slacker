<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Pixel Isle — 探岛玩家 (Singapore Heritage App)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #bd3d97;
    --grey: #e4eaee;
    --blue: #0a5799;
    --blue-deep: #073f72;
    --water-hl: #1a6cb3;
    --font-pixel: 'Press Start 2P', monospace;
    --font-sans: 'Nunito', sans-serif;
  }

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    height: 100%;
    background: #121016;
    font-family: var(--font-sans);
    overflow: hidden;
    color: #fff;
    -webkit-font-smoothing: antialiased;
  }

  /* Singapore pink+blue starfield background */
  .starfield {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: .45;
  }
  .starfield .layer {
    position: absolute; inset: 0;
    background-repeat: repeat;
    image-rendering: pixelated;
  }
  .star-a {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><g fill='%23bd3d97'><rect x='12' y='30' width='2' height='2'/><rect x='14' y='32' width='2' height='2'/><rect x='10' y='32' width='2' height='2'/><rect x='12' y='34' width='2' height='2'/><rect x='12' y='32' width='2' height='2'/></g><g fill='%230a5799'><rect x='80' y='100' width='2' height='2'/><rect x='82' y='102' width='2' height='2'/><rect x='78' y='102' width='2' height='2'/><rect x='80' y='104' width='2' height='2'/><rect x='80' y='102' width='2' height='2'/></g><g fill='%23bd3d97' opacity='.7'><rect x='128' y='60' width='2' height='2'/><rect x='130' y='62' width='2' height='2'/><rect x='126' y='62' width='2' height='2'/><rect x='128' y='64' width='2' height='2'/></g></svg>");
    animation: starDrift 60s linear infinite;
  }
  .star-b {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><g fill='%230a5799' opacity='.6'><rect x='40' y='40' width='2' height='2'/><rect x='42' y='42' width='2' height='2'/><rect x='38' y='42' width='2' height='2'/></g><g fill='%23bd3d97' opacity='.5'><rect x='170' y='150' width='2' height='2'/><rect x='172' y='152' width='2' height='2'/></g><g fill='%230a5799' opacity='.5'><rect x='100' y='180' width='2' height='2'/></g></svg>");
    animation: starDrift 110s linear infinite reverse;
  }
  @keyframes starDrift {
    from { background-position: 0 0; }
    to   { background-position: 320px -240px; }
  }

  /* Main workspace layout */
  .workspace {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
    gap: 40px;
    padding: 20px;
  }

  @media (max-width: 900px) {
    .workspace {
      flex-direction: column;
      overflow-y: auto;
      height: auto;
      min-height: 100vh;
      padding: 40px 10px;
    }
  }

  /* Database Panel UI */
  .db-panel {
    width: 320px;
    background: rgba(25, 20, 35, 0.85);
    border: 1px solid rgba(189, 61, 151, 0.3);
    border-radius: 20px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    display: flex;
    flex-direction: column;
    height: 812px;
    overflow: hidden;
  }

  @media (max-width: 900px) {
    .db-panel {
      width: 100%;
      max-width: 375px;
      height: auto;
      margin-top: 20px;
    }
  }

  .db-header {
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .db-title {
    font-family: var(--font-pixel);
    font-size: 10px;
    color: var(--pink);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .db-subtitle {
    font-size: 12px;
    color: #a898c0;
  }

  .db-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .db-console {
    background: #0d0a11;
    border-radius: 10px;
    padding: 12px;
    border: 1.5px solid #231b2e;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    font-size: 11px;
    color: #61dfa1;
    white-space: pre-wrap;
    max-height: 200px;
    overflow-y: auto;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
  }

  .db-btn {
    appearance: none;
    border: none;
    border-radius: 10px;
    padding: 8px 12px;
    background: var(--blue);
    color: #fff;
    font-family: var(--font-pixel);
    font-size: 8px;
    letter-spacing: 0.5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 3px 0 var(--blue-deep);
    transition: transform 0.1s, box-shadow 0.1s;
    text-align: center;
  }

  .db-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 var(--blue-deep);
  }

  .db-btn.reset {
    background: #d63864;
    box-shadow: 0 3px 0 #9e1b3e;
  }

  .db-btn.reset:active {
    box-shadow: 0 1px 0 #9e1b3e;
  }

  /* Phone Simulator Frame */
  .phone-frame {
    position: relative;
    width: 375px;
    height: 812px;
    background: #000;
    border-radius: 48px;
    box-shadow: 
      0 0 0 10px #1e1b24,
      0 0 0 12px #34303c,
      0 20px 60px rgba(0, 0, 0, 0.8),
      0 0 100px rgba(189, 61, 151, 0.15);
    overflow: hidden;
    user-select: none;
    flex-shrink: 0;
  }

  /* iOS Dynamic Island */
  .phone-island {
    position: absolute;
    top: 13px;
    left: 50%;
    transform: translateX(-50%);
    width: 110px;
    height: 28px;
    background: #000;
    border-radius: 20px;
    z-index: 9999;
    box-shadow: inset 0 0.5px 2px rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: width 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28), height 0.3s;
  }

  .phone-island.expanded {
    width: 240px;
    height: 38px;
  }

  .phone-island-content {
    font-family: var(--font-pixel);
    font-size: 7px;
    color: #fff;
    opacity: 0;
    transition: opacity 0.2s ease 0.1s;
    display: flex;
    align-items: center;
    gap: 8px;
    width: 90%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    justify-content: center;
  }

  .phone-island.expanded .phone-island-content {
    opacity: 1;
  }

  /* Internal phone view */
  .phone-content {
    position: absolute;
    inset: 0;
    border-radius: 36px;
    overflow: hidden;
    background: #e8e4f4;
    display: flex;
    flex-direction: column;
    z-index: 10;
  }

  /* Screens transition system */
  .screen-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.4s;
    opacity: 0;
    pointer-events: none;
  }

  .screen.active {
    opacity: 1;
    pointer-events: auto;
  }

  /* Toast Notification */
  .toast {
    position: absolute;
    top: 55px;
    left: 12px;
    right: 12px;
    background: rgba(12, 6, 22, 0.94);
    border: 1.5px solid var(--pink);
    border-radius: 12px;
    padding: 10px 14px;
    z-index: 999;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    gap: 10px;
    transform: translateY(-80px);
    opacity: 0;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
    pointer-events: none;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
    pointer-events: auto;
  }

  .toast-emoji {
    font-size: 20px;
  }

  .toast-body {
    flex: 1;
  }

  .toast-title {
    font-family: var(--font-pixel);
    font-size: 8px;
    color: var(--pink);
    margin-bottom: 2px;
  }

  .toast-text {
    font-size: 11px;
    color: #e4eaee;
    font-weight: 600;
  }

  /* App Theme configurations */
  .app-dark {
    background: #0e081c !important;
    color: #f0e8ff !important;
  }

  .scrollable {
    overflow-y: auto;
    scrollbar-width: none;
  }
  .scrollable::-webkit-scrollbar {
    display: none;
  }

  .animate-pulse-pixel {
    animation: pixelPulse 1.5s steps(2, end) infinite;
  }

  @keyframes pixelPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  .checkin-spark {
    position: absolute;
    pointer-events: none;
    font-size: 18px;
    animation: sparkFly 0.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
    z-index: 99999;
  }

  @keyframes sparkFly {
    0% {
      transform: translate(0, 0) scale(0.5);
      opacity: 1;
    }
    100% {
      transform: translate(var(--dx), var(--dy)) scale(1.2);
      opacity: 0;
    }
  }

  /* Custom Horizontal Scroll tags */
  .filter-row {
    display: flex;
    gap: 8px;
    padding: 8px 14px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-row::-webkit-scrollbar {
    display: none;
  }

  .filter-tag {
    flex-shrink: 0;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    background: rgba(10, 87, 153, 0.05);
    color: var(--blue);
    border: 1px solid rgba(10, 87, 153, 0.15);
    transition: all 0.2s;
  }

  .filter-tag.active {
    background: var(--blue);
    color: #fff;
    border-color: var(--blue);
  }

  .filter-tag.feeling {
    background: rgba(189, 61, 151, 0.05);
    color: var(--pink);
    border-color: rgba(189, 61, 151, 0.15);
  }

  .filter-tag.feeling.active {
    background: var(--pink);
    color: #fff;
    border-color: var(--pink);
  }

  /* Pixel Progress Bar for Passport */
  .pixel-progress-container {
    background: #0d0a11;
    border: 2px solid #231b2e;
    height: 16px;
    position: relative;
    overflow: hidden;
    image-rendering: pixelated;
  }

  .pixel-progress-fill {
    background: var(--pink);
    height: 100%;
    transition: width 0.4s ease;
  }

  .pixel-progress-ticks {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
  }

  .pixel-progress-ticks span {
    width: 2px;
    height: 100%;
    background: rgba(255, 255, 255, 0.15);
  }

  /* Trail Checklist Styles */
  .trail-check-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: rgba(10, 87, 153, 0.04);
    border: 1px solid rgba(10, 87, 153, 0.08);
    border-radius: 10px;
    font-size: 11px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .trail-check-item:hover {
    background: rgba(10, 87, 153, 0.08);
  }

  .trail-check-box {
    width: 16px;
    height: 16px;
    border: 2px solid var(--blue);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: var(--blue);
    font-size: 10px;
    background: #fff;
  }

  .trail-check-box.checked {
    background: var(--blue);
    color: #fff;
  }

  /* ── Loader & Logo Reveal Styles ── */
  .loader-container {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--grey);
    z-index: 1000;
    overflow: hidden;
  }
  .loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    opacity: 1;
    transform: scale(1);
    transition: opacity .55s ease, transform .55s ease;
  }
  .tipbar {
    width: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    text-align: center;
  }
  .tip-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 4px 8px;
    border-radius: 4px;
    background: var(--pink);
    color: #fff;
    font-family: var(--font-pixel);
    font-size: 7px;
    letter-spacing: 1px;
    text-transform: uppercase;
    box-shadow: 0 0 0 1px #fff, 0 0 0 3px var(--pink);
  }
  .tip-badge .lantern {
    width: 8px; height: 10px;
    background:
      linear-gradient(#fff, #fff) 3px 0 / 2px 2px no-repeat,
      linear-gradient(#fff, #fff) 2px 2px / 4px 1px no-repeat,
      linear-gradient(#fff, #fff) 1px 3px / 6px 4px no-repeat,
      linear-gradient(#fff, #fff) 2px 7px / 4px 1px no-repeat;
    background-color: transparent;
  }
  .tip-text {
    min-height: 40px;
    color: var(--blue);
    font-family: var(--font-pixel);
    font-size: 8px;
    line-height: 1.6;
    letter-spacing: .1px;
    max-width: 280px;
    transition: opacity .28s ease;
  }
  .tip-text.swap { opacity: 0; }
  .tip-text b { color: var(--pink); font-weight: inherit; }
  .progress {
    display: flex; gap: 4px;
    padding: 3px;
    background: #fff;
    box-shadow: 0 0 0 1.5px var(--blue);
  }
  .progress span {
    width: 10px; height: 8px;
    background: var(--grey);
  }
  .progress span.on { background: var(--pink); }
  .prompt {
    color: var(--blue);
    font-family: var(--font-pixel);
    font-size: 7px;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity .4s ease;
    margin-top: -8px;
  }
  .prompt.show { opacity: 1; animation: blink 1.1s steps(2, end) infinite; }
  .prompt .pink { color: var(--pink); }
  
  .whirl {
    position: relative;
    width: 260px;
    height: 260px;
    display: grid;
    place-items: center;
    animation: whirlSpin 18s linear infinite;
    transform: scale(0.85);
  }
  @keyframes whirlSpin {
    to { transform: rotate(360deg); }
  }
  .orbit {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .orbit svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }
  .orbit .ring {
    fill: none;
    stroke: var(--pink);
    stroke-linecap: round;
  }
  .orbit-a { animation: orbitA 3.2s linear infinite; transform-origin: 50% 50%; }
  .orbit-b { animation: orbitB 4.8s linear infinite reverse; transform-origin: 50% 50%; }
  .orbit-c { animation: orbitC 6.5s linear infinite; transform-origin: 50% 50%; }
  @keyframes orbitA { to { transform: rotate(360deg); } }
  @keyframes orbitB { to { transform: rotate(360deg); } }
  @keyframes orbitC { to { transform: rotate(360deg); } }

  .comet {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 6px;
    height: 6px;
    margin: -3px 0 0 -3px;
    border-radius: 50%;
    background: var(--pink);
    box-shadow: 0 0 0 1.5px rgba(189,61,151,.15), 0 0 14px rgba(189,61,151,.55);
  }
  .comet.b { background: var(--blue); box-shadow: 0 0 0 1.5px rgba(10,87,153,.15), 0 0 14px rgba(10,87,153,.55); }
  .comet-track {
    position: absolute;
    inset: 0;
    transform-origin: 50% 50%;
  }
  .comet-track .comet {
    transform: translate(95px, 0);
  }
  .track-1 {
    transform: rotateX(62deg);
    animation: trackSpin 3.2s linear infinite;
  }
  .track-2 {
    transform: rotateX(62deg) rotateZ(90deg);
    animation: trackSpin 4.8s linear infinite reverse;
  }
  @keyframes trackSpin { to { transform: rotateX(62deg) rotate(360deg); } }
  .track-2 { animation-name: trackSpin2; }
  @keyframes trackSpin2 {
    from { transform: rotateX(62deg) rotateZ(90deg) rotate(0deg); }
    to   { transform: rotateX(62deg) rotateZ(90deg) rotate(360deg); }
  }

  .globe {
    position: relative;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    overflow: hidden;
    background: var(--blue);
    box-shadow:
      inset -14px -14px 40px rgba(0,0,0,.40),
      inset 11px 11px 28px rgba(255,255,255,.06),
      0 14px 40px rgba(10,87,153,.35),
      0 0 0 1px rgba(10,87,153,.15);
    z-index: 2;
  }
  .globe canvas.map {
    position: absolute;
    top: 50%;
    left: 0;
    width: 320px;
    height: 160px;
    transform: translateY(-50%);
    image-rendering: pixelated;
    animation: scrollMap 9s linear infinite;
  }
  @keyframes scrollMap {
    from { transform: translate(0, -50%); }
    to   { transform: translate(-160px, -50%); }
  }
  .globe .shade {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    pointer-events: none;
    background:
      radial-gradient(circle at 32% 28%, rgba(255,255,255,.22), rgba(255,255,255,0) 45%),
      radial-gradient(circle at 70% 80%, rgba(0,0,0,.42), rgba(0,0,0,0) 55%),
      radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 60%, rgba(0,0,0,.25) 100%);
  }
  .globe .grid {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: .18;
  }

  /* Logo reveal stage */
  .logo-reveal-container {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--grey);
    z-index: 1000;
    gap: 20px;
  }
  .logo-reveal-container canvas {
    width: 300px;
    height: 300px;
    image-rendering: pixelated;
    filter: drop-shadow(0 10px 24px rgba(10,87,153,.18));
  }
  .logo-reveal-container .ready {
    color: var(--blue);
    font-family: var(--font-pixel);
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 1;
    animation: blink 1.1s steps(2, end) infinite;
    margin-top: 10px;
  }

  /* Additional Gacha/Shop Styles */
  .gacha-machine {
    background: #0d0a11;
    border: 3px solid var(--blue);
    border-radius: 16px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.8), 0 4px 15px rgba(10,87,153,0.3);
    position: relative;
    overflow: hidden;
  }
  .gacha-screen {
    width: 100%;
    height: 150px;
    background: #191423;
    border: 2px solid var(--pink);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .gacha-shaker {
    font-size: 64px;
    animation: gachaShake 0.4s ease infinite;
    display: inline-block;
  }
  @keyframes gachaShake {
    0%, 100% { transform: rotate(0deg) translateY(0); }
    25% { transform: rotate(-8deg) translateY(-4px); }
    75% { transform: rotate(8deg) translateY(-2px); }
  }
  .gacha-reveal {
    animation: gachaPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }
  @keyframes gachaPop {
    0% { transform: scale(0.3); opacity: 0; }
    70% { transform: scale(1.2); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .gacha-handle {
    width: 48px;
    height: 48px;
    background: var(--pink);
    border: 3px solid #fff;
    border-radius: 50%;
    box-shadow: 0 4px 0 #8a236a;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .gacha-handle:active {
    transform: rotate(180deg) scale(0.95);
  }
  
  /* Shop merchandise card */
  .merch-card {
    background: rgba(255,255,255,0.03);
    border: 1.5px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: border-color 0.2s;
  }
  .app-dark .merch-card {
    background: rgba(255,255,255,0.02);
  }
  .merch-card:hover {
    border-color: rgba(189, 61, 151, 0.2);
  }
  
  /* Interactive quiz styling */
  .quiz-container {
    background: rgba(10, 87, 153, 0.05);
    border: 1.5px dashed var(--blue);
    border-radius: 12px;
    padding: 10px;
    margin-top: 10px;
  }
  .quiz-option {
    background: #fff;
    color: var(--blue);
    border: 1px solid rgba(10, 87, 153, 0.2);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 10px;
    margin-top: 6px;
    cursor: pointer;
    text-align: left;

const DB = {
  get: (key, fallback) => {
    try {
      const val = localStorage.getItem('pixel_isle:' + key);
      return val ? JSON.parse(val) : fallback;
    } catch {
      return fallback;
    }
  },
  set: (key, val) => {
    try {
      localStorage.setItem('pixel_isle:', 'active'); // marker
      localStorage.setItem('pixel_isle:' + key, JSON.stringify(val));
    } catch {}
  },
  clear: () => {
    try {
      Object.keys(localStorage).forEach(k => {
        if (k.startsWith('pixel_isle:')) {
          localStorage.removeItem(k);
        }
      });
      window.dispatchEvent(new Event('local-db-updated'));
    } catch {}
  }
};

/* ── Map Screen View (狮城茶迹) ────────────────────────────────── */
function ExploreMapTab({ 
  dark, 
  coins, 
  unlockedPins, 
  visitedSpots, 
  selectedCharacter, 
  onPinClick, 
  activePin, 
  onCheckIn, 
  onUnlockDistrict,
  selectedFeeling,
  setSelectedFeeling,
  selectedHeritage,
  setSelectedHeritage,
  selectedArea,
  setSelectedArea,
  selectedAmenity,
  setSelectedAmenity,
  chineseTrailCheckins,
  onTrailCheckin,
  hasCompletedTrail,
  activeSubTab,
  setActiveSubTab,
  showToast,
  setCoins,
  quizAnswers,
  setQuizAnswers
}) {
  const sheetBg = dark ? '#160b28' : '#fff';
  const ink = dark ? '#f0e8ff' : BLU;
  const muted = dark ? '#7060a0' : '#8878a8';
  
  const [filterCat, setFilterCat] = React.useState('feelings'); // feelings, culture, area, amenities
  const [sheetTab, setSheetTab] = React.useState('details'); // details, story
  const [quizState, setQuizState] = React.useState({ answered: false, correct: false });

  React.useEffect(() => {
    if (activePin) {
      const isAlreadyAnswered = quizAnswers && quizAnswers.includes(activePin.id);
      setQuizState({ answered: isAlreadyAnswered, correct: isAlreadyAnswered });
      setSheetTab('details'); // Reset bottom tab
    }
  }, [activePin, quizAnswers]);

  // Real-time map filtering highlights
  const isPinHighlighted = (pin) => {
    if (!selectedFeeling && !selectedHeritage && !selectedArea && !selectedAmenity) return true;
    
    let matchFeeling = true;
    if (selectedFeeling) {
      const cleanFeeling = selectedFeeling.replace(/[^a-zA-Z\s]/g, '').trim();
      matchFeeling = pin.feelings.some(f => f.toLowerCase().includes(cleanFeeling.toLowerCase()));
    }
    
    let matchHeritage = true;
    if (selectedHeritage) {
      const cleanHeritage = selectedHeritage.replace(/[^a-zA-Z\s\/]/g, '').trim();
      matchHeritage = pin.cultural.some(c => c.toLowerCase().includes(cleanHeritage.toLowerCase()));
    }

    let matchArea = true;
    if (selectedArea) {
      matchArea = pin.area === selectedArea;
    }

    let matchAmenity = true;
    if (selectedAmenity) {
      matchAmenity = pin.amenities.includes(selectedAmenity);
    }
    
    return matchFeeling && matchHeritage && matchArea && matchAmenity;
  };

  const handleQuizSubmit = (option) => {
    if (quizState.answered) return;
    const isCorrect = option === activePin.quizAnswer;
    if (isCorrect) {
      const nextAnswers = [...quizAnswers, activePin.id];
      setQuizAnswers(nextAnswers);
      DB.set('quizAnswers', nextAnswers);
      setCoins(coins + 5);
      showToast('🎉', 'CORRECT ANSWER', 'Pop quiz solved! Earned 🪙5 Coins!');
      setQuizState({ answered: true, correct: true });
    } else {
      showToast('❌', 'INCORRECT', 'That is incorrect! Read the story again and retry.');
    }
  };

  const trailStopsDone = chineseTrailCheckins.length;
  const trailPercentage = Math.round((trailStopsDone / CHINESE_TRAIL_STOPS.length) * 100);

  // Compute number of active filters
  const hasActiveFilters = selectedFeeling || selectedHeritage || selectedArea || selectedAmenity;
  const clearAllFilters = () => {
    setSelectedFeeling(null);
    setSelectedHeritage(null);
    setSelectedArea(null);
    setSelectedAmenity(null);
  };

  return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', background: dark ? '#0e081c' : '#f5f0ff', overflow:'hidden' }}>
      
      {/* Search & On-screen filters header */}

          <button

            }}

              {filterCat === 'culture' && (

/* ── Collect / 阅章 Badge Album Screen ──────────────────────────── */
function CollectBadgesScreen({ 
  dark, 
  unlockedPins, 
  visitedSpots, 
  hasCompletedTrail, 
  coins, 
  setCoins,
  unlockedCharacters,
  setUnlockedCharacters,
  selectedCharacter,
  setSelectedCharacter,
  showToast,
  orders,
  setOrders
}) {
  const ink = dark ? '#f0e8ff' : BLU;
  const muted = dark ? '#7060a0' : '#8878a8';
  
  const [subTab, setSubTab] = React.useState('badges'); // badges, gacha, merch
  const [gachaState, setGachaState] = React.useState('idle'); // idle, shaking, revealed
  const [gachaResult, setGachaResult] = React.useState(null);
  const [matchingGroup, setMatchingGroup] = React.useState(null); // matching index

  const handleGachaDraw = () => {
    if (coins < 50) {
      showToast('❌', 'INSUFFICIENT COINS', 'Drawing a blind box costs 50 Coins! Check in at locations to earn more.');
      return;
    }
    setCoins(coins - 50);
    setGachaState('shaking');
    
    setTimeout(() => {
      // Pick a random character
      const randomChar = CHARS[Math.floor(Math.random() * CHARS.length)];
      const isAlreadyUnlocked = unlockedCharacters.includes(randomChar.id);
      
      let toastMsg = '';
      if (isAlreadyUnlocked) {
        setCoins(prev => prev + 15); // refund 15 coins for duplicate
        toastMsg = `Duplicate character! Refunded +🪙15 Coins.`;
      } else {
        const nextChars = [...unlockedCharacters, randomChar.id];
        setUnlockedCharacters(nextChars);
        DB.set('unlockedCharacters', nextChars);
        toastMsg = `Unlocked companion: ${randomChar.name}!`;
      }
      
      setGachaResult({ char: randomChar, duplicate: isAlreadyUnlocked });
      setGachaState('revealed');
      showToast(randomChar.emoji, isAlreadyUnlocked ? 'GACHA DUPLICATE' : 'GACHA UNLOCKED', toastMsg);
      window.dispatchEvent(new Event('local-db-updated'));
    }, 1200);
  };

  const handleGroupBuy = (item, isGroup) => {
    const cost = isGroup ? item.groupPrice : item.soloPrice;
    if (coins < cost) {
      showToast('❌', 'INSUFFICIENT COINS', `Redeeming this requires 🪙${cost} Coins!`);
      return;
    }

    if (isGroup) {
      setMatchingGroup(item.id);
      setTimeout(() => {
        setMatchingGroup(null);
        setCoins(coins - cost);
        const newOrder = {
          id: 'order_' + Date.now(),
          item: item.name,
          emoji: item.emoji,
          price: cost,
          status: 'Completed (Group buy matched)',
          date: new Date().toLocaleDateString()
        };
        const nextOrders = [...orders, newOrder];
        setOrders(nextOrders);
        DB.set('orders', nextOrders);
        showToast('👥', 'GROUP BUY SUCCESS', `Virtual group buy matched! Ordered ${item.name} for 🪙${cost}!`);
        window.dispatchEvent(new Event('local-db-updated'));
      }, 2000);
    } else {
      setCoins(coins - cost);
      const newOrder = {
        id: 'order_' + Date.now(),
        item: item.name,
        emoji: item.emoji,
        price: cost,
        status: 'Ordered (Solo)',
        date: new Date().toLocaleDateString()
      };
      const nextOrders = [...orders, newOrder];
      setOrders(nextOrders);
      DB.set('orders', nextOrders);
      showToast('📦', 'ORDER COMPLETED', `Solo redemption successful! Ordered ${item.name} for 🪙${cost}!`);
      window.dispatchEvent(new Event('local-db-updated'));
    }
  };

  // Mock physical merchandise
  const MERCH_ITEMS = [
    { id: 'pin_chinatown', name: '📍 Chinatown Heritage Pin', emoji: '📍', soloPrice: 100, groupPrice: 30, desc: 'Collector enamel pin for Chinatown.' },
    { id: 'pin_mosque', name: '📍 Sultan Mosque Enamel Pin', emoji: '🕌', soloPrice: 100, groupPrice: 30, desc: 'Gilded enamel pin for Kampong Glam.' },
    { id: 'pin_india', name: '📍 Little India Enamel Pin', emoji: '🪔', soloPrice: 100, groupPrice: 30, desc: 'Vibrant enamel pin for Little India.' },
    { id: 'keychain_yueban', name: '🔑 Yueban Companion Keychain Set', emoji: '🔑', soloPrice: 150, groupPrice: 40, desc: 'Keychain set of all 5 pixel Yueban buddies.' },
    { id: 'stamp_sheet', name: '🖼️ Cultural Passport Stamp Sheet', emoji: '🖼️', soloPrice: 80, groupPrice: 25, desc: 'Real commemorative stamp grid sheet.' }
  ];

  return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', background: dark ? '#0e081c' : '#f5f0ff', padding: '12px 14px 0', overflow:'hidden' }}>
      
      {/* Subtab selection headers */}
      <div style={{ display: 'flex', gap: 6, marginBottom: 10, flexShrink: 0 }}>
        <button 
          onClick={() => { setSubTab('badges'); setGachaState('idle'); }}
          style={{
            flex: 1, padding: '6px', fontFamily: FPX, fontSize: '6.5px', borderRadius: '8px', border: 'none', cursor: 'pointer',
            background: subTab === 'badges' ? PIK : dark ? 'rgba(255,255,255,0.06)' : '#fff',
            color: subTab === 'badges' ? '#fff' : dark ? '#8878a8' : BLU

        >
          🏆 Badges (阅章)

/* ── getPlayerTier helper function ───────────────────────────────── */
const getPlayerTier = (visitedCount) => {
  if (visitedCount >= 12) return { name: 'Grand Master of Xia (探岛宗师)', badge: '🏆' };
  if (visitedCount >= 8) return { name: 'Heritage Guardian (文化守护者)', badge: '🥇' };
  if (visitedCount >= 4) return { name: 'Island Finder (寻岛家)', badge: '🥈' };
  return { name: 'Explorer (探索者)', badge: '🥉' };
};

/* ── Main App Component ──────────────────────────────────────────── */
function App() {
  // Startup State Engine: loading -> logo -> app
  const [appState, setAppState] = React.useState('loading');
  const [dark, setDark] = React.useState(() => DB.get('dark', false));
  
  // App virtual states
  const [character, setCharacter] = React.useState(() => DB.get('character', null));
  const [coins, setCoins] = React.useState(() => DB.get('coins', 47));
  const [unlockedPins, setUnlockedPins] = React.useState(() => DB.get('unlockedPins', ['Merlion', 'Chinatown', 'Arab St', 'Gardens']));
  const [visitedSpots, setVisitedSpots] = React.useState(() => DB.get('visitedSpots', []));
  const [chineseTrailCheckins, setChineseTrailCheckins] = React.useState(() => DB.get('chineseTrailCheckins', []));
  
  // Gacha and Shop extensions
  const [unlockedCharacters, setUnlockedCharacters] = React.useState(() => DB.get('unlockedCharacters', ['mei']));
  const [orders, setOrders] = React.useState(() => DB.get('orders', []));
  const [quizAnswers, setQuizAnswers] = React.useState(() => DB.get('quizAnswers', []));
  
  // Daily check-in coins tracker
  const [lastCheckinDate, setLastCheckinDate] = React.useState(() => DB.get('lastCheckinDate', null));

  // Cultural passport percentages
  const [passportProgress, setPassportProgress] = React.useState(() => DB.get('passportProgress', {
    chinese: 30,
    malay: 60,
    indian: 40,
    peranakan: 80,
    colonial: 20
  }));

  // Filtering states
  const [selectedFeeling, setSelectedFeeling] = React.useState(null);
  const [selectedHeritage, setSelectedHeritage] = React.useState(null);
  const [selectedArea, setSelectedArea] = React.useState(null);
  const [selectedAmenity, setSelectedAmenity] = React.useState(null);

  // Tab views
  const [activeTab, setActiveTab] = React.useState(0); // 0=Explore, 1=Collect, 2=Profile
  const [activeSubTab, setActiveSubTab] = React.useState('map'); // 'map' or 'trails'
  const [activePin, setActivePin] = React.useState(null); // active spot details
  const [toast, setToast] = React.useState(null);

  const hasCompletedTrail = chineseTrailCheckins.length === CHINESE_TRAIL_STOPS.length;

  // Loader dynamic elements
  const canvasRef = React.useRef(null);
  const logoCanvasRef = React.useRef(null);
  const [loadingProgress, setLoadingProgress] = React.useState(0);
  const [tipText, setTipText] = React.useState('Loading the lion city…');
  const [showPrompt, setShowPrompt] = React.useState(false);

  // Drawing the spinning globe canvas
  React.useEffect(() => {
    if (appState === 'loading' && canvasRef.current) {
      const canvas = canvasRef.current;
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      
      // Draw background ocean
      ctx.fillStyle = '#0a5799';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      const cols = 72;
      const rows = 36;
      const tileW = 160;
      const bandH = 80;
      const yOffset = 40;
      const cellW = tileW / cols;
      const cellH = bandH / rows;
      
      const drawTile = (offsetX) => {
        for (let r = 0; r < rows; r++) {
          const row = MAP_ROWS[r];
          for (let c = 0; c < cols; c++) {
            if (row[c] !== '#') continue;
            const accent = ((c * 7 + r * 13) % 47) === 0;
            ctx.fillStyle = accent ? '#bd3d97' : '#e4eaee';
            const x = offsetX + Math.floor(c * cellW);
            const y = yOffset + Math.floor(r * cellH);
            const w = Math.ceil(cellW);
            const h = Math.ceil(cellH);
            ctx.fillRect(x, y, w, h);
          }
        }
      };
      
      drawTile(0);
      drawTile(tileW);
    }
  }, [appState]);

  // Loading progress bar simulation
  React.useEffect(() => {
    if (appState === 'loading') {
      const interval = setInterval(() => {
        setLoadingProgress(prev => {
          if (prev >= 10) {
            clearInterval(interval);
            setShowPrompt(true);
            return 10;
          }
          return prev + 1;
        });
      }, 240);
      return () => clearInterval(interval);
    }
  }, [appState]);

  // Tip text rotations
  React.useEffect(() => {
    if (appState === 'loading') {
      let idx = 0;
      const interval = setInterval(() => {
        idx = (idx + 1) % TIPS.length;
        setTipText(TIPS[idx]);
      }, 3000);
      return () => clearInterval(interval);
    }
  }, [appState]);

  // Logo Reveal Animation in stepState
  React.useEffect(() => {
    if (appState === 'logo' && logoCanvasRef.current) {
      const logoCanvas = logoCanvasRef.current;
      const lctx = logoCanvas.getContext('2d');
      const off = document.createElement('canvas');
      const offCtx = off.getContext('2d');
      const W = logoCanvas.width, H = logoCanvas.height;
      
      const logoImg = new Image();
      let reqId;
      
      logoImg.onload = () => {
        let revealStart = performance.now();
        const stepReveal = (now) => {
          const t = Math.min(1, (now - revealStart) / 1100); // 1.1s reveal
          const e = 1 - Math.pow(1 - t, 3); // easeOutCubic
          const chunk = Math.max(1, Math.round(40 * (1 - e) + 1 * e));
          const small = Math.max(1, Math.round(W / chunk));
          
          off.width = off.height = small;
          offCtx.imageSmoothingEnabled = false;
          offCtx.clearRect(0, 0, small, small);
          offCtx.drawImage(logoImg, 0, 0, small, small);
          
          lctx.imageSmoothingEnabled = false;
          lctx.clearRect(0, 0, W, H);
          lctx.drawImage(off, 0, 0, W, H);
          
          if (t < 1) {
            reqId = requestAnimationFrame(stepReveal);
          }
        };
        reqId = requestAnimationFrame(stepReveal);
      };
      logoImg.onerror = () => {
        // Fallback text if image not found
        lctx.fillStyle = '#0a5799';
        lctx.font = '24px "Press Start 2P"';
        lctx.fillText('PIXEL ISLE', 50, 150);
      };
      logoImg.src = 'assets/pixel-isle-logo.png';
      return () => cancelAnimationFrame(reqId);
    }
  }, [appState]);

  // Save states side-effects
  React.useEffect(() => {
    DB.set('dark', dark);
    DB.set('character', character);
    DB.set('coins', coins);
    DB.set('unlockedPins', unlockedPins);
    DB.set('visitedSpots', visitedSpots);
    DB.set('chineseTrailCheckins', chineseTrailCheckins);
    DB.set('passportProgress', passportProgress);
    DB.set('unlockedCharacters', unlockedCharacters);
    DB.set('orders', orders);
    DB.set('quizAnswers', quizAnswers);
    DB.set('lastCheckinDate', lastCheckinDate);
  }, [dark, character, coins, unlockedPins, visitedSpots, chineseTrailCheckins, passportProgress, unlockedCharacters, orders, quizAnswers, lastCheckinDate]);

  // Sync state back from debug panel button triggers
  React.useEffect(() => {
    const syncFromDB = () => {
      setDark(DB.get('dark', false));
      setCharacter(DB.get('character', null));
      setCoins(DB.get('coins', 47));
      setUnlockedPins(DB.get('unlockedPins', ['Merlion', 'Chinatown', 'Arab St', 'Gardens']));
      setVisitedSpots(DB.get('visitedSpots', []));
      setChineseTrailCheckins(DB.get('chineseTrailCheckins', []));
      setPassportProgress(DB.get('passportProgress', {
        chinese: 30,
        malay: 60,
        indian: 40,
        peranakan: 80,
        colonial: 20
      }));
      setUnlockedCharacters(DB.get('unlockedCharacters', ['mei']));
      setOrders(DB.get('orders', []));
      setQuizAnswers(DB.get('quizAnswers', []));
      setLastCheckinDate(DB.get('lastCheckinDate', null));
    };

    window.addEventListener('local-db-updated', syncFromDB);
    return () => window.removeEventListener('local-db-updated', syncFromDB);
  }, []);

  // Toast dynamic island alert
  const showToast = (emoji, title, text) => {
    setToast({ emoji, title, text });
    
    const island = document.getElementById('island');
    if (island) {
      island.classList.add('expanded');
      const textSpan = document.getElementById('islandText');
      if (textSpan) textSpan.innerText = title;
    }

    setTimeout(() => {
      setToast(null);
      if (island) island.classList.remove('expanded');
    }, 3200);
  };

  const triggerSparks = (e, count = 12) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const x = rect.left + rect.width / 2;
    const y = rect.top + rect.height / 2;
    const emojis = ['🧧', '🕌', '🪔', '🦁', '🪙', '✨'];

    for (let i = 0; i < count; i++) {
      const spark = document.createElement('span');
      spark.className = 'checkin-spark';
      spark.innerText = emojis[Math.floor(Math.random() * emojis.length)];
      spark.style.left = `${x}px`;
      spark.style.top = `${y}px`;
      
      const angle = Math.random() * Math.PI * 2;
      const distance = 40 + Math.random() * 80;
      const dx = Math.cos(angle) * distance;
      const dy = Math.sin(angle) * distance;
      
      spark.style.setProperty('--dx', `${dx}px`);
      spark.style.setProperty('--dy', `${dy}px`);
      
      document.body.appendChild(spark);
      setTimeout(() => spark.remove(), 800);
    }
  };

  const handleSelectCharacter = (char) => {
    setCharacter(char);
    // Make sure it is added to unlocked list
    if (!unlockedCharacters.includes(char.id)) {
      setUnlockedCharacters([...unlockedCharacters, char.id]);
    }
    showToast(char.emoji, 'YUEBAN SELECT', `${char.name} is now active companion!`);
  };

  // Click handler for location pins
  const handlePinClick = (pin) => {
    setActivePin(pin === activePin ? null : pin);
  };

  // Spot check-in triggers passport updates
  const handleCheckIn = (pin, e) => {
    triggerSparks(e);
    
    const isFirstVisit = !visitedSpots.includes(pin.id);
    let earnedCoins = 15;
    
    const nextVisited = isFirstVisit ? [...visitedSpots, pin.id] : visitedSpots;
    setVisitedSpots(nextVisited);
    setCoins(coins + earnedCoins);

    // Increment corresponding passport categories
    const cat = pin.heritageCategory;
    const currentScore = passportProgress[cat] || 0;
    const nextScore = Math.min(100, currentScore + (isFirstVisit ? 20 : 5));
    
    setPassportProgress({
      ...passportProgress,
      [cat]: nextScore
    });

    showToast(pin.emoji, 'STAMP CHECK-IN', isFirstVisit ? `Stamp Collected! +🪙${earnedCoins} · ${cat.toUpperCase()} +20%` : `Stamped again! · ${cat.toUpperCase()} +5%`);
    window.dispatchEvent(new Event('local-db-updated'));
  };

  const handleUnlockDistrict = (pin) => {
    if (coins < pin.cost) return;
    setCoins(coins - pin.cost);
    setUnlockedPins([...unlockedPins, pin.id]);
    showToast('🔓', 'STAMP UNLOCKED', `${pin.label.split(' ')[0]} added to active passport.`);
    window.dispatchEvent(new Event('local-db-updated'));
  };

  // Trail sub-stop check-in
  const handleTrailCheckin = (stopId) => {
    if (chineseTrailCheckins.includes(stopId)) return;
    
    const nextCheckins = [...chineseTrailCheckins, stopId];
    setChineseTrailCheckins(nextCheckins);
    setCoins(coins + 5);

    // Increase Chinese Passport category
    setPassportProgress({
      ...passportProgress,
      chinese: Math.min(100, passportProgress.chinese + 10)
    });

    if (nextCheckins.length === CHINESE_TRAIL_STOPS.length) {
      showToast('🏮', 'TRAIL COMPLETED', 'Chinese Heritage Trail finished! Stamp badge set unlocked!');
    } else {
      showToast('🧧', 'TRAIL PROGRESS', 'Sub-stop verified! +🪙5 · CHINESE +10%');
    }
    window.dispatchEvent(new Event('local-db-updated'));
  };

  // Daily spin / coin claim
  const handleDailyCheckin = (e) => {
    const today = new Date().toDateString();
    if (lastCheckinDate === today) {
      showToast('🪙', 'DAILY CHECKED', 'You already claimed your daily coins. Come back tomorrow!');
      return;
    }
    triggerSparks(e);
    setCoins(coins + 10);
    setLastCheckinDate(today);
    showToast('🪙', 'DAILY BONUS', 'Claimed Daily explorer bonus: +🪙10 Coins!');
    window.dispatchEvent(new Event('local-db-updated'));
  };

  const handleResetData = () => {
    DB.clear();
    setCharacter(null);
    setCoins(47);
    setUnlockedPins(['Merlion', 'Chinatown', 'Arab St', 'Gardens']);
    setVisitedSpots([]);
    setChineseTrailCheckins([]);
    setUnlockedCharacters(['mei']);
    setOrders([]);
    setQuizAnswers([]);
    setLastCheckinDate(null);
    setPassportProgress({
      chinese: 30,
      malay: 60,
      indian: 40,
      peranakan: 80,
      colonial: 20
    });
    setActiveTab(0);
    setActivePin(null);
    setAppState('loading');
    setLoadingProgress(0);
    setShowPrompt(false);
    showToast('🔄', 'PASSPORT RESET', 'Local database returned to onboarding state.');
    window.dispatchEvent(new Event('local-db-updated'));
  };

  const categories = Object.values(passportProgress);
  const passportScore = Math.round(categories.reduce((a,b)=>a+b, 0) / categories.length);

  return (
    <div style={{ width:'100%', height:'100%', display:'flex', flexDirection:'column', position:'relative' }} className={dark ? 'app-dark' : ''}>
      
      {/* ── STAGE 1: Spinning Globe Loader ── */}
      {appState === 'loading' && (
        <div className="loader-container" onClick={() => showPrompt && setAppState('logo')}>
          <div className="loader">
            <div className="whirl">
              <div className="orbit orbit-a">
                <svg viewBox="0 0 320 320">
                  <circle className="ring" cx="160" cy="160" r="120" strokeWidth="2" strokeDasharray="3 9" opacity=".55"/>
                </svg>
              </div>
              <div className="orbit orbit-b">
                <svg viewBox="0 0 320 320">
                  <ellipse class="ring" cx="160" cy="160" rx="130" ry="50" strokeWidth="2" strokeDasharray="2 14" opacity=".7"/>
                </svg>
              </div>
              <div className="orbit orbit-c">
                <svg viewBox="0 0 320 320">
                  <ellipse class="ring" cx="160" cy="160" rx="50" ry="130" strokeWidth="2" strokeDasharray="2 12" opacity=".55" stroke="#0a5799"/>
                </svg>
              </div>
              <div className="comet-track track-1"><div className="comet"></div></div>
              <div className="comet-track track-2"><div class="comet b"></div></div>
              <div className="globe">
                <canvas ref={canvasRef} className="map" width="320" height="160"></canvas>
                <svg className="grid" viewBox="0 0 160 160" preserveAspectRatio="none">
                  <ellipse cx="80" cy="80" rx="80" ry="11" fill="none" stroke="#e4eaee" strokeWidth="0.8"/>
                  <ellipse cx="80" cy="80" rx="80" ry="27" fill="none" stroke="#e4eaee" strokeWidth="0.8"/>
                  <ellipse cx="80" cy="80" rx="80" ry="45" fill="none" stroke="#e4eaee" strokeWidth="0.8"/>
                  <ellipse cx="80" cy="80" rx="80" ry="64" fill="none" stroke="#e4eaee" strokeWidth="0.8"/>
                </svg>
                <div className="shade"></div>
              </div>
            </div>
            <div className="tipbar">
              <div className="tip-badge"><span className="lantern" aria-hidden="true"></span> Tip</div>
              <div className="tip-text" dangerouslySetInnerHTML={{ __html: tipText }}></div>
              <div className="progress">
                {[...Array(10)].map((_, i) => (
                  <span key={i} className={i <= loadingProgress ? 'on' : ''}></span>
                ))}
              </div>
              <div className={`prompt ${showPrompt ? 'show' : ''}`}>
                Tap <span className="pink">screen</span> to start
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── STAGE 2: Pixel-Reveal Logo ── */}
      {appState === 'logo' && (
        <div className="logo-reveal-container" onClick={() => setAppState('app')}>
          <canvas ref={logoCanvasRef} width="300" height="300"></canvas>
          <div className="ready">Tap <span className="pink">anywhere</span> to enter</div>
        </div>
      )}

      {/* ── STAGE 3: Main App Simulator ── */}
      {appState === 'app' && (
        <>
          {/* Dynamic Toast banner overlay */}
          <div className={`toast ${toast ? 'show' : ''}`}>
            {toast && (
              <>
                <span className="toast-emoji">{toast.emoji}</span>
                <div className="toast-body">
                  <div className="toast-title">{toast.title}</div>
                  <div className="toast-text">{toast.text}</div>
                </div>
              </>
            )}
          </div>

          {/* Floating Daily coin widget */}
          {character && (
            <button className="floating-coin-btn" onClick={handleDailyCheckin}>
              🪙 Daily Stamp
            </button>
          )}

          <StatusBar dark={dark} coins={coins} passportScore={passportScore} />

          <div className="screen-container">
            
            {/* Onboarding Screen if buddy null */}
            {!character ? (
              <div className="screen active scrollable">
                <CharacterSelectScreen dark={dark} onSelectCharacter={handleSelectCharacter} />
              </div>
            ) : (
              <>
                {/* EXPLORE TAB (MAP & TRAILS) */}
                <div className={`screen ${activeTab === 0 ? 'active' : ''}`}>
                  <ExploreMapTab 
                    dark={dark}
                    coins={coins}
                    unlockedPins={unlockedPins}
                    visitedSpots={visitedSpots}
                    selectedCharacter={character}
                    onPinClick={handlePinClick}
                    activePin={activePin}
                    onCheckIn={handleCheckIn}
                    onUnlockDistrict={handleUnlockDistrict}
                    selectedFeeling={selectedFeeling}
                    setSelectedFeeling={setSelectedFeeling}
                    selectedHeritage={selectedHeritage}
                    setSelectedHeritage={setSelectedHeritage}
                    selectedArea={selectedArea}
                    setSelectedArea={setSelectedArea}
                    selectedAmenity={selectedAmenity}
                    setSelectedAmenity={setSelectedAmenity}
                    chineseTrailCheckins={chineseTrailCheckins}
                    onTrailCheckin={handleTrailCheckin}
                    hasCompletedTrail={hasCompletedTrail}
                    activeSubTab={activeSubTab}
                    setActiveSubTab={setActiveSubTab}
                    showToast={showToast}
                    setCoins={setCoins}
                    quizAnswers={quizAnswers}
                    setQuizAnswers={setQuizAnswers}
                  />
                </div>

                {/* COLLECT BADGES, GACHA & SHOP TAB */}
                <div className={`screen ${activeTab === 1 ? 'active' : ''}`}>
                  <CollectBadgesScreen 
                    dark={dark} 
                    unlockedPins={unlockedPins} 
                    visitedSpots={visitedSpots} 
                    hasCompletedTrail={hasCompletedTrail}
                    coins={coins}
                    setCoins={setCoins}
                    unlockedCharacters={unlockedCharacters}
                    setUnlockedCharacters={setUnlockedCharacters}
                    selectedCharacter={character}
                    setSelectedCharacter={setCharacter}
                    showToast={showToast}
                    orders={orders}
                    setOrders={setOrders}
                  />
                </div>

                {/* CULTURAL PASSPORT TAB */}
                <div className={`screen ${activeTab === 2 ? 'active' : ''}`}>
                  <ProfilePassportScreen 
                    dark={dark} 
                    selectedCharacter={character} 
                    coins={coins} 
                    visitedSpots={visitedSpots} 
                    passportProgress={passportProgress}
                    onReset={handleResetData}
                  />
                </div>

                <BottomNav active={activeTab} dark={dark} onChangeTab={(tab) => {
                  setActiveTab(tab);
                  if (tab !== 0) setActivePin(null);
                }} />
              </>
            )}

          </div>
        </>
      )}
    </div>
  );
}

// Render the application into root node
ReactDOM.createRoot(document.getElementById('react-root')).render(<App />);

</script>

<!-- Pure JS Database Console Synchronizer -->
<script>
  function getAppDBJSON() {
    const db = {};
    Object.keys(localStorage).forEach(k => {
      if (k.startsWith('pixel_isle:')) {
        const cleanKey = k.replace('pixel_isle:', '');
        try {
          db[cleanKey] = JSON.parse(localStorage.getItem(k));
        } catch {
          db[cleanKey] = localStorage.getItem(k);
        }
      }
    });
    return JSON.stringify(db, null, 2);
  }

  function updateDBConsole() {
    const consoleEl = document.getElementById('dbConsole');
    if (consoleEl) {
      consoleEl.innerText = getAppDBJSON();
    }
  }

  // Monitor updates to DB
  window.addEventListener('local-db-updated', updateDBConsole);
  setInterval(updateDBConsole, 1000); // Backstop poller

  // Tweak database values directly
  function tweakDB(action, arg) {
    if (action === 'coins') {
      const curCoins = Number(localStorage.getItem('pixel_isle:coins')) || 0;
      localStorage.setItem('pixel_isle:coins', JSON.stringify(curCoins + arg));
    } else if (action === 'complete_trail') {
      localStorage.setItem('pixel_isle:chineseTrailCheckins', JSON.stringify(['ct_1', 'ct_2', 'ct_3', 'ct_4']));
      const curProgress = JSON.parse(localStorage.getItem('pixel_isle:passportProgress') || '{}');
      curProgress.chinese = 100;
      localStorage.setItem('pixel_isle:passportProgress', JSON.stringify(curProgress));
    } else if (action === 'max_passport') {
      localStorage.setItem('pixel_isle:passportProgress', JSON.stringify({
        chinese: 90,
        malay: 90,
        indian: 90,
        peranakan: 90,
        colonial: 90
      }));
    }
    
    // Dispatch event
    window.dispatchEvent(new Event('local-db-updated'));
  }

  function resetAppDB() {
    localStorage.clear();
    window.dispatchEvent(new Event('local-db-updated'));
  }

  // Pre-populate empty db
  if (!localStorage.getItem('pixel_isle:coins')) {
    localStorage.setItem('pixel_isle:coins', '47');
    localStorage.setItem('pixel_isle:unlockedPins', JSON.stringify(['Merlion', 'Chinatown', 'Arab St', 'Gardens']));
    localStorage.setItem('pixel_isle:visitedSpots', JSON.stringify([]));
    localStorage.setItem('pixel_isle:chineseTrailCheckins', JSON.stringify([]));
    localStorage.setItem('pixel_isle:passportProgress', JSON.stringify({
      chinese: 30,
      malay: 60,
      indian: 40,
      peranakan: 80,
      colonial: 20
    }));
  }
  updateDBConsole();
</script>

</body>
